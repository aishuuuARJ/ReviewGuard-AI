<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ReviewGuard AI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            height: 100vh;
            position: relative;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            color: #FFFFFF;
            z-index: 5;
        }
        .back-home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            transition: all 0.3s ease;
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8) !important;
        }
        .back-home-btn:hover {
            border-color: #FFFFFF;
            color: #FFFFFF !important;
            transform: translateX(-3px);
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <!-- Back to Home Button -->
    <a href="index.html" class="btn btn-sm btn-outline-light rounded-pill px-3 py-2 back-home-btn">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </a>

    <div class="glass-card login-card animate-fade-in">
        <div class="text-center mb-4">
            <a href="index.html" class="text-decoration-none d-flex align-items-center justify-content-center mb-2">
                <i class="fas fa-shield-halved logo-icon"></i>
                <span class="fw-bold fs-3 display-font text-white">ReviewGuard AI</span>
            </a>
            <p class="text-muted small">Sign in to your analyzer dashboard</p>
        </div>

        <div id="loginAlert" class="alert alert-danger d-none p-2 small" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label small fw-medium">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-white border-secondary"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control bg-transparent text-white border-secondary" id="email" required placeholder="name@company.com">
                </div>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label small fw-medium">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-white border-secondary"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control bg-transparent text-white border-secondary" id="password" required placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 mb-3" id="submitBtn">
                <span id="spinner" class="spinner-border spinner-border-sm d-none me-2"></span>Sign In
            </button>
        </form>

        <div class="text-center">
            <p class="mb-0 text-muted small">Don't have an account? <a href="register.html" class="text-info text-decoration-none fw-bold">Register here</a></p>
        </div>
    </div>

    <script src="js/app.js?v=1.0.2"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('loginAlert');
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('spinner');

            alertBox.classList.add('d-none');
            spinner.classList.remove('d-none');
            submitBtn.disabled = true;

            const result = await loginUser(email, password);
            
            spinner.classList.add('d-none');
            submitBtn.disabled = false;

            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                alertBox.innerText = result.error || 'Invalid credentials';
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
